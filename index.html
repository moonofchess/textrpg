<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그냥 중세 판타지에서 살아남기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260610c" />
</head>
<body>
  <div id="vignette"></div>
  <div id="snow"></div>
  <div id="fx-flash"></div>
  <div id="fx-layer"></div>

  <!-- 타이틀 화면 -->
  <main id="title-screen" class="screen active">
    <div class="title-wrap">
      <p class="title-kicker">제국력 741년 · 늦겨울 · 서부 변경</p>
      <h1 class="title-main">그냥 중세 판타지에서<br />살아남기</h1>
      <p class="title-sub">밑바닥 거지가 무너지는 세계에서 살아남는 생존 대서사</p>
      <blockquote class="title-quote">
        “살아. 착하게 살 생각 말고, 일단 살아.”
        <cite>— 늙은 마라</cite>
      </blockquote>
      <div class="title-buttons">
        <button id="btn-new" class="btn btn-primary">새로 시작</button>
        <button id="btn-continue" class="btn">이어하기</button>
        <button id="btn-cloud-load" class="btn btn-ghost">클라우드 불러오기</button>
        <button id="btn-board-title" class="btn btn-ghost">명예의 전당</button>
        <button id="btn-codex-title" class="btn btn-ghost">설정 열람</button>
      </div>
      <p class="title-foot">진흙골에서 시작한다. 빵 한 덩이는 목숨이고, 이름 한 줄은 신분이다.</p>
    </div>
  </main>

  <!-- 게임 화면 -->
  <main id="game-screen" class="screen">
    <header class="topbar">
      <div class="topbar-left">
        <span class="phase-tag" id="phase-tag">1부 1페이즈</span>
        <span class="loc-tag" id="loc-tag">진흙골</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="btn-board" title="명예의 전당">전당</button>
        <button class="icon-btn" id="btn-codex" title="설정 열람">설정</button>
        <button class="icon-btn" id="btn-save" title="저장 (로컬+클라우드)">저장</button>
        <button class="icon-btn" id="btn-menu" title="타이틀로">메뉴</button>
      </div>
    </header>

    <div class="game-body">
      <aside class="sidebar">
        <div class="char-card">
          <div class="char-name">로완 <span class="char-prev">前 청연</span></div>
          <div class="char-status" id="char-status">진흙골의 아이</div>
        </div>
        <div class="stats" id="stats"></div>
        <div class="resources">
          <div class="res-row"><span>동전</span><span id="res-coins">0</span></div>
          <div class="res-row"><span>배급권</span><span id="res-ration">0</span></div>
          <div class="res-row"><span>날</span><span id="res-day">1</span></div>
        </div>
        <div class="inventory">
          <h3>물자</h3>
          <ul id="supplies-list"><li class="empty">없음</li></ul>
        </div>
        <div class="inventory">
          <h3>소지품</h3>
          <ul id="inventory-list"><li class="empty">없음</li></ul>
        </div>
      </aside>

      <section class="story-pane">
        <div class="scene-head">
          <h2 class="scene-title" id="scene-title"></h2>
        </div>
        <div class="scene-text" id="scene-text"></div>
        <div class="choices" id="choices"></div>
      </section>
    </div>
  </main>

  <!-- 설정 열람(코덱스) 모달 -->
  <div id="codex-modal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h2>설정 열람</h2>
        <button class="icon-btn" id="codex-close">닫기</button>
      </div>
      <div class="codex-layout">
        <nav class="codex-tabs" id="codex-tabs"></nav>
        <div class="codex-content" id="codex-content"></div>
      </div>
    </div>
  </div>

  <!-- 명예의 전당(리더보드) 모달 -->
  <div id="board-modal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h2>명예의 전당</h2>
        <button class="icon-btn" id="board-close">닫기</button>
      </div>
      <div class="board-body">
        <div class="board-name-row">
          <label for="board-name">모험가 이름</label>
          <input id="board-name" type="text" maxlength="20" placeholder="이름없는 생존자" />
          <button class="btn" id="board-name-save">이름 저장</button>
        </div>
        <div id="board-status" class="board-status"></div>
        <div id="board-list" class="board-list"></div>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/cloud.js?v=20260610c"></script>
  <script src="js/story.js?v=20260610c"></script>
  <script src="js/codex.js?v=20260610c"></script>
  <script src="js/combat.js?v=20260610c"></script>
  <script src="js/engine.js?v=20260610c"></script>
</body>
</html>
